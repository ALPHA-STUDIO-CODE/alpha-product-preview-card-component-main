<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>
  <div id="container">
    <div id="big">
      <div id="top">
        <picture>
          <source media="(min-width: 900px)" srcset="./assets/images/image-product-desktop.jpg" />
          <img src="./assets/images/image-product-mobile.jpg" id="image" alt="Perfume jpg" />
        </picture>
      </div>

      <div id="bottom">
        <p id="perfume">Perfume</p>
        <h1 id="heading">Gabrielle Essence Eau De Parfum</h1>
        <p id="description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div id="pricing">
          <h1 id="current-price">$149.99</h1>
          <p id="old-price">$169.99</p>
        </div>
        <button type="button" id="add-to-cart-btn">
          <span id="cart_icon">
            <img src="./assets/images/icon-cart.svg" alt="Cart Icon" width="15" height="16" /> </span>Add to Cart
        </button>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend
        Mentor</a>. Coded by <a href="https://github.com/ALPHA-STUDIO-CODE">ALPHA STUDIO CODE</a>.
    </footer>
  </div>
</body>

</html>
